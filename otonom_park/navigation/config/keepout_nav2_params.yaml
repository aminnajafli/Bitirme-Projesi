amcl:
  ros__parameters:
    use_sim_time: True  # Simülasyon zamanı kullan
    alpha1: 0.05  # Dönüş sırasında rotasyonel gürültü azaltıldı - robotun kendi etrafında dönerken belirsizlik
    alpha2: 0.05  # Hareket sırasında rotasyonel gürültü azaltıldı - robotun ileri giderken yön belirsizliği
    alpha3: 0.05  # Hareket sırasında translasyonel gürültü azaltıldı - robotun ileri giderken pozisyon belirsizliği
    alpha4: 0.05  # Dönüş sırasında translasyonel gürültü azaltıldı - robotun dönerken pozisyon belirsizliği
    alpha5: 0.02  # Araba benzeri hareket için yanal kayma gürültüsü azaltıldı - yan yöne kayma belirsizliği
    base_frame_id: "base_footprint"  # URDF kök çerçevesi ile tutarlı - robotun ana referans çerçevesi
    beam_skip_distance: 0.5  # Işın atlama mesafesi - hangi mesafede lazer ışınları atlanacak
    beam_skip_error_threshold: 0.9  # Işın atlama hata eşiği - hata toleransı
    beam_skip_threshold: 0.3  # Işın atlama eşiği - hangi ışınların atlanacağı
    do_beamskip: false  # Işın atlama devre dışı - tüm lazer ışınları kullanılacak
    global_frame_id: "map"  # Global harita çerçevesi - genel koordinat sistemi
    lambda_short: 0.1  # Kısa mesafe parametresi - yakın engeller için ağırlık
    laser_likelihood_max_dist: 2.0  # Lazer olabilirlik maksimum mesafe - lazer ölçümlerinin güvenilir olduğu max mesafe
    laser_max_range: 30.0  # Lazer maksimum menzili - lazer sensörünün maksimum algılama mesafesi
    laser_min_range: 0.1  # Lazer minimum menzili - lazer sensörünün minimum algılama mesafesi
    laser_model_type: "likelihood_field"  # Lazer model tipi - olasılık alanı modeli kullan
    max_beams: 120  # Daha iyi hassasiyet için artırıldı - kullanılacak maksimum lazer ışını sayısı
    max_particles: 2000  # Daha iyi lokalizasyon için artırıldı - maksimum parçacık sayısı
    min_particles: 500   # Minimum artırıldı - minimum parçacık sayısı
    odom_frame_id: "odom"  # Odometri çerçeve kimliği - odometri koordinat sistemi
    pf_err: 0.01  # Daha sıkı yakınsama için azaltıldı - parçacık filtresi hatası
    pf_z: 0.99  # Parçacık filtresi z değeri - yeniden örnekleme için eşik
    recovery_alpha_fast: 0.1   # Hızlı kurtarma etkinleştirildi - hızlı uyum parametresi
    recovery_alpha_slow: 0.001 # Yavaş kurtarma etkinleştirildi - yavaş uyum parametresi
    resample_interval: 1  # Yeniden örnekleme aralığı - kaç güncellemede bir parçacık yenileme
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # Araba benzeri robotlar için daha iyi - hareket modeli
    save_pose_rate: 0.5  # Poz kaydetme oranı - saniyede kaç kez poz kaydedilecek
    sigma_hit: 0.1   # Sensör gürültüsü azaltıldı - lazer isabetlerindeki belirsizlik
    tf_broadcast: true  # Transform yayını etkin - transform bilgilerini yayınla
    transform_tolerance: 0.5 # Hassasiyet için çok daha sıkı tolerans - transform gecikmesi toleransı
    update_min_a: 0.1   # Daha sık açısal güncellemeler - minimum açısal değişim eşiği
    update_min_d: 0.1   # Daha sık mesafe güncellemeleri - minimum mesafe değişim eşiği
    z_hit: 0.7     # Doğru okumalar için ağırlık artırıldı - doğru lazer okumasının ağırlığı
    z_max: 0.05  # Maksimum menzil ağırlığı - menzil dışı ölçümler
    z_rand: 0.2    # Rastgele gürültü azaltıldı - rastgele hatalı ölçüm ağırlığı
    z_short: 0.05  # Kısa mesafe ağırlığı - beklenenden kısa ölçümler
    scan_topic: "/scan"  # Lazer tarama topic'i - lazer verilerinin geldiği kanal
    set_initial_pose: True  # Başlangıç pozisyonu ayarla - ilk pozisyonu belirle
    always_reset_initial_pose: False  # Her zaman başlangıç pozisyonunu sıfırlama - sürekli sıfırlama yapma
    initial_pose:  # Başlangıç pozisyonu - robotun başlangıçta olacağı konum
      x: 0.0  # X koordinatı
      y: 0.0  # Y koordinatı
      z: 0.0  # Z koordinatı (genellikle 0)
      yaw: -1.4  # Yaw açısı - robotun başlangıç yönü

bt_navigator:
  ros__parameters:
    use_sim_time: True  # Simülasyon zamanı kullan
    global_frame: map  # Global koordinat çerçevesi - harita referansı
    robot_base_frame: base_footprint  # Robot ana çerçevesi - robotun referans noktası
    odom_topic: "/odom"  # Odometri topic'i - robot hızı ve pozisyon verilerinin geldiği kanal
    bt_loop_duration: 10  # Davranış ağacı döngü süresi - saniyede kaç kez davranış ağacı çalıştırılacak
    default_server_timeout: 20  # Varsayılan sunucu zaman aşımı - sunucu cevabı için maksimum bekleme süresi
    default_bt_xml_filename: "/home/otagg/ros2_ws/src/navigation_2025/bt.xml"  # Davranış ağacı dosyası
    plugin_lib_names:  # Davranış ağacı eklenti kütüphaneleri - kullanılacak davranış modülleri
    - nav2_compute_path_to_pose_action_bt_node  # Hedefe yol hesaplama
    - nav2_compute_path_through_poses_action_bt_node  # Çoklu hedefe yol hesaplama
    - nav2_smooth_path_action_bt_node  # Yol yumuşatma
    - nav2_follow_path_action_bt_node  # Yol takip etme
    - nav2_spin_action_bt_node  # Dönme hareketi
    - nav2_wait_action_bt_node  # Bekleme hareketi
    - nav2_assisted_teleop_action_bt_node  # Yardımlı uzaktan kumanda
    - nav2_back_up_action_bt_node  # Geri gitme hareketi
    - nav2_drive_on_heading_bt_node  # Belirli yönde ilerleme
    - nav2_clear_costmap_service_bt_node  # Maliyet haritası temizleme
    - nav2_is_stuck_condition_bt_node  # Sıkışma durumu kontrol
    - nav2_goal_reached_condition_bt_node  # Hedefe ulaşma kontrol
    - nav2_goal_updated_condition_bt_node  # Hedef güncelleme kontrol
    - nav2_globally_updated_goal_condition_bt_node  # Global hedef güncelleme kontrol
    - nav2_is_path_valid_condition_bt_node  # Yol geçerliliği kontrol
    - nav2_initial_pose_received_condition_bt_node  # Başlangıç pozisyonu alma kontrol
    - nav2_reinitialize_global_localization_service_bt_node  # Global lokalizasyon yeniden başlatma
    - nav2_rate_controller_bt_node  # Oran kontrolörü
    - nav2_distance_controller_bt_node  # Mesafe kontrolörü
    - nav2_speed_controller_bt_node  # Hız kontrolörü
    - nav2_truncate_path_action_bt_node  # Yol kırpma
    - nav2_truncate_path_local_action_bt_node  # Yerel yol kırpma
    - nav2_goal_updater_node_bt_node  # Hedef güncelleme düğümü
    - nav2_recovery_node_bt_node  # Kurtarma düğümü
    - nav2_pipeline_sequence_bt_node  # Ardışık işlem düğümü
    - nav2_round_robin_node_bt_node  # Döngüsel seçim düğümü
    - nav2_transform_available_condition_bt_node  # Transform mevcut durumu kontrol
    - nav2_time_expired_condition_bt_node  # Zaman aşımı kontrol
    - nav2_path_expiring_timer_condition  # Yol zaman aşımı kontrol
    - nav2_distance_traveled_condition_bt_node  # Kat edilen mesafe kontrol
    - nav2_single_trigger_bt_node  # Tek tetikleme düğümü
    - nav2_goal_updated_controller_bt_node  # Hedef güncelleme kontrolörü
    - nav2_is_battery_low_condition_bt_node  # Düşük batarya kontrol
    - nav2_navigate_through_poses_action_bt_node  # Çoklu hedefe navigasyon
    - nav2_navigate_to_pose_action_bt_node  # Tek hedefe navigasyon
    - nav2_remove_passed_goals_action_bt_node  # Geçilen hedefleri kaldırma
    - nav2_planner_selector_bt_node  # Planlayıcı seçici
    - nav2_controller_selector_bt_node  # Kontrolör seçici
    - nav2_goal_checker_selector_bt_node  # Hedef kontrol seçici
    - nav2_controller_cancel_bt_node  # Kontrolör iptal etme
    - nav2_path_longer_on_approach_bt_node  # Yaklaşırken yol uzatma
    - nav2_wait_cancel_bt_node  # Bekleme iptal etme
    - nav2_spin_cancel_bt_node  # Dönme iptal etme
    - nav2_back_up_cancel_bt_node  # Geri gitme iptal etme
    - nav2_assisted_teleop_cancel_bt_node  # Yardımlı kumanda iptal etme
    - nav2_drive_on_heading_cancel_bt_node  # Yönde ilerleme iptal etme

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True  # Simülasyon zamanı kullan - tek hedef navigasyon düğümü

controller_server:
  ros__parameters:
    use_sim_time: True  # Simülasyon zamanı kullan
    controller_frequency: 8.0  # Hesaplama yükünü azaltmak için daha da azaltıldı - kontrolör çalışma frekansı
    min_x_velocity_threshold: 0.001  # Minimum X hız eşiği - ileri/geri minimum hız
    min_y_velocity_threshold: 0.5  # Minimum Y hız eşiği - yanal minimum hız
    min_theta_velocity_threshold: 0.001  # Minimum açısal hız eşiği - dönüş minimum hız
    progress_checker_plugin: "progress_checker"  # İlerleme kontrol eklentisi
    goal_checker_plugins: ["goal_checker"]  # Hedef kontrol eklentileri
    controller_plugins: ["FollowPath"]  # Kontrolör eklentileri - kullanılacak kontrol algoritmaları
    controller_server_timeout: 1.0  # Daha iyi performans için zaman aşımı artırıldı - komut zaman aşımı

    progress_checker:  # İlerleme kontrol ayarları
      plugin: "nav2_controller::SimpleProgressChecker"  # Basit ilerleme kontrol eklentisi
      required_movement_radius: 0.01  # Gerekli hareket yarıçapı - robotun hareket ettiği kabul edilen minimum mesafe
      movement_time_allowance: 30.0  # Hareket zaman toleransı - robot hareket etmezse kaç saniye beklenecek
    
    # ARABALAR İÇİN NOKTA ATIŞI DURMA AYARI (YAW TOLERANSI DEĞİŞTİRİLDİ)
    goal_checker:  
      plugin: "nav2_controller::SimpleGoalChecker"  # Basit hedef kontrol eklentisi
      xy_goal_tolerance: 0.65  # Park kutusunun içine girme toleransı
      yaw_goal_tolerance: 3.14  # ARABA İÇİN KRİTİK: Açısal düzeltmeyi devre dışı bırakır, park alanında arabayı kilitler!
      stateful: True  # Durumlu kontrol - hedef kontrol durumunu sakla
    
    FollowPath:  # Yol takip kontrolör ayarları
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"  # Düzenlenmiş saf takip kontrolörü
      desired_linear_vel: 0.8  # Daha hızlı hız
      lookahead_dist: 2.0
      min_lookahead_dist: 1.5
      max_lookahead_dist: 3.5
      lookahead_time: 1.5
      min_turning_radius: 1.5
      rotate_to_heading_angular_vel: 1.2
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.10
      approach_velocity_scaling_dist: 1.2
      use_collision_detection: false  # Çarpışma algılama açıldı
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.40
      regulated_linear_scaling_min_speed: 0.15
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.7
      max_angular_accel: 3.0
      max_robot_pose_search_dist: 6.0
      use_interpolation: true
      cost_scaling_dist: 0.7
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
      allow_reversing: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True  # Simülasyon zamanı kullan - kontrolör düğümü ayarları

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True  # Simülasyon zamanı kullan
      update_frequency: 3.0  # Yerel maliyet haritası güncelleme frekansı
      publish_frequency: 3.0  # Yerel maliyet haritası yayın frekansı
      global_frame: odom  # Global çerçeve - odometri koordinat sistemi
      robot_base_frame: base_footprint  # Robot ana çerçevesi - robotun referans noktası
      width: 40  # Maliyet haritası genişliği
      height: 40  # Maliyet haritası yüksekliği
      resolution: 0.05  # Çözünürlük - her hücrenin metre cinsinden boyutu
      rolling_window: True  # Kaydırılabilir pencere - robot hareket ettikçe harita kaydırılır
      always_send_full_costmap: True  # Her zaman tam maliyet haritasını gönder
      footprint: "[[-1.1, -0.6], [1.1, -0.6], [1.1, 0.6], [-1.1, 0.6]]"  # Robot footprint
      footprint_padding: 0.05  # Daha az padding
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      filters: ["keepout_filter", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 1.2  # Güvenlik mesafesi
        cost_scaling_factor: 3.0  # Duvarlardan maksimum itilme faktörü
      obstacle_layer:  # Engel katmanı
        plugin: "nav2_costmap_2d::ObstacleLayer"  
        enabled: True  
        observation_sources: scan  
        scan:  
          topic: /scan  
          max_obstacle_height: 2.0  
          clearing: True  
          marking: True  
          data_type: "LaserScan"  
          raytrace_max_range: 2.5  
          raytrace_min_range: 0.0  
          obstacle_max_range: 2.0  
          obstacle_min_range: 0.0  
      static_layer:  # Statik katman
        plugin: "nav2_costmap_2d::StaticLayer"  
        enabled: True  
        map_subscribe_transient_local: True  
      keepout_filter:  # Yasak alan filtresi
        plugin: "nav2_costmap_2d::KeepoutFilter"  
        enabled: True  
        filter_info_topic: "/costmap_filter_info"  

  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True  # Simülasyon zamanı kullan
      update_frequency: 0.5  
      publish_frequency: 0.5  
      global_frame: map  # Global çerçeve - harita koordinat sistemi
      robot_base_frame: base_footprint  
      resolution: 0.05  
      always_send_full_costmap: True  
      track_unknown_space: True  
      footprint: "[[-1.1, -0.6], [1.1, -0.6], [1.1, 0.6], [-1.1, 0.6]]"  
      footprint_padding: 0.05  
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]  
      filters: ["keepout_filter", "inflation_layer"]  
      inflation_layer:  
        plugin: "nav2_costmap_2d::InflationLayer"  
        enabled: True  
        inflation_radius: 1.2 
        cost_scaling_factor: 3.0  
      obstacle_layer:  
        plugin: "nav2_costmap_2d::ObstacleLayer"  
        enabled: True  
        observation_sources: scan  
        scan:  
          topic: /scan  
          max_obstacle_height: 2.0  
          clearing: True  
          marking: True  
          data_type: "LaserScan"  
          raytrace_max_range: 3.0  
          raytrace_min_range: 0.0  
          obstacle_max_range: 2.5  
          obstacle_min_range: 0.0  
      static_layer:  
        plugin: "nav2_costmap_2d::StaticLayer"  
        enabled: True  
        map_subscribe_transient_local: True  
      keepout_filter:  
        plugin: "nav2_costmap_2d::KeepoutFilter"  
        enabled: True  
        filter_info_topic: "/costmap_filter_info"  

  global_costmap_client:
    ros__parameters:
      use_sim_time: True  
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True  

map_server:
  ros__parameters:
    use_sim_time: True  
    yaml_filename: "$HOME/ros2_ws/src/navigation_2025/maps/teknofestObstacle.yaml"  

map_saver:
  ros__parameters:
    use_sim_time: True  
    save_map_timeout: 5.0  
    free_thresh_default: 0.25  
    occupied_thresh_default: 0.65  
    map_subscribe_transient_local: True  

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]  
    use_sim_time: True  

    GridBased:  # Izgara tabanlı hibrit SMAC planlayıcı ayarları
      plugin: "nav2_smac_planner/SmacPlannerHybrid"  
      tolerance: 0.5  
      downsample_costmap: true  
      downsampling_factor: 2  
      allow_unknown: false  
      max_iterations: 500000  
      max_on_approach_iterations: 500  
      max_planning_time: 3.0  
      motion_model_for_search: "REEDS_SHEPP"  # Araba hareketi modeli
      cost_travel_multiplier: 2.0  
      angle_quantization_bins: 36  
      analytic_expansion_ratio: 3.5  
      analytic_expansion_max_length: 3.0  
      minimum_turning_radius: 1.5  
      reverse_penalty: 4.0  
      change_penalty: 0.3  
      non_straight_penalty: 1.3  
      cost_penalty: 5.0  
      retrospective_penalty: 0.015  
      lookup_table_size: 20.0  
      use_quadratic_cost_penalty: False  
      cache_obstacle_heuristic: False  
      downsample_obstacle_heuristic: True  
      allow_primitive_interpolation: False  
      smooth_path: True  
      smoother:  
        max_iterations: 1000  
        w_smooth: 0.3  
        w_data: 0.2  
        tolerance: 1.0e-10  
        do_refinement: False  
        refinement_num: 2  
        
smoother_server:
  ros__parameters:
    use_sim_time: True  
    smoother_plugins: ["SmoothPath"]  

    SmoothPath:  
      plugin: "nav2_constrained_smoother/ConstrainedSmoother"  
      reversing_enabled: true  
      path_downsampling_factor: 2  
      path_upsampling_factor: 1  
      keep_start_orientation: true  
      keep_goal_orientation: true  
      minimum_turning_radius: 1.5  
      w_curve: 30.0  
      w_dist: 0.0  
      w_smooth: 2000000.0  
      w_cost: 0.015  
      w_cost_cusp_multiplier: 3.0  
      cusp_zone_length: 2.5  
      optimizer:  
        max_iterations: 50  
        debug_optimizer: false  
        gradient_tol: 1e-8  
        fn_tol: 1.0e-6  
        param_tol: 1.0e-12  

behavior_server:
  ros__parameters:
    local_costmap_topic: /local_costmap/costmap_raw  
    local_footprint_topic: /local_costmap/published_footprint  
    global_costmap_topic: /global_costmap/costmap_raw  
    global_footprint_topic: /global_costmap/published_footprint  
    cycle_frequency: 3.0  
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]  
    spin:  
      plugin: "nav2_behaviors/Spin"  
    backup:  
      plugin: "nav2_behaviors/BackUp"  
    drive_on_heading:  
      plugin: "nav2_behaviors/DriveOnHeading"  
    wait:  
      plugin: "nav2_behaviors/Wait"  
    assisted_teleop:  
      plugin: "nav2_behaviors/AssistedTeleop"  
    local_frame: odom  
    global_frame: map  
    robot_base_frame: base_footprint  
    transform_timeout: 0.5  
    simulate_ahead_time: 3.0  
    max_rotational_vel: 3.0  
    min_rotational_vel: 0.4  
    rotational_acc_lim: 3.2  
    enable_stamped_cmd_vel: false  
    
robot_state_publisher:
  ros__parameters:
    use_sim_time: True  

waypoint_follower:
  ros__parameters:
    loop_rate: 5  
    stop_on_failure: false  
    waypoint_task_executor_plugin: "wait_at_waypoint"  
    wait_at_waypoint:  
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"  
      enabled: True  
      waypoint_pause_duration: 0  

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 8.0  
    scale_velocities: false  
    feedback: "OPEN_LOOP"  
    max_velocity: [0.8, 0.0, 0.8]  
    min_velocity: [-0.8, 0.0, -0.8]  
    deadband_velocity: [0.0, 0.0, 0.0]  
    velocity_timeout: 1.0  
    max_accel: [1.0, 0.0, 1.0]  
    max_decel: [-1.0, 0.0, -1.0]  
    odom_topic: "/odom"  
    odom_duration: 0.1  
    use_realtime_priority: false  
    enable_stamped_cmd_vel: false